<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../pta/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../pta/config.js"></script>
  <title data-i18n="tuning.pageTitle">性能改善の根拠 & 効果分析</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <!-- D3.js & Flatpickr CSS -->
  <script src="https://d3js.org/d3.v7.min.js" crossorigin></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="../src/style.css">
  <style>
    /* 신규 기능 전용 프리미엄 스타일 */
    .tuning-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .tuning-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 1.25rem;
      backdrop-filter: blur(12px);
      text-align: center;
      transition: all 0.3s;
    }

    .tuning-card:hover {
      transform: translateY(-4px);
      border-color: rgba(34, 197, 94, 0.2);
    }

    .tuning-card h4 {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .tuning-card .value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .tuning-card .change-rate {
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 0.25rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .rate-up {
      color: #f87171;
    }

    .rate-down {
      color: #4ade80;
    }

    .period-selectors {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      background: var(--bg-secondary, #f8fafc);
      border: 1px solid var(--border-color, #e2e8f0);
      padding: 1rem 1.5rem;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(0, 0, 0, 0.05));
    }

    .datepicker-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .datepicker-wrapper label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
      min-width: 140px; /* 개선 전/후 기간 텍스트 정렬 정돈 */
    }

    .flatpickr-input-custom {
      background: #ffffff;
      border: 1px solid var(--border-color, #e2e8f0);
      color: var(--text-primary);
      padding: 0.45rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      width: 120px;
      outline: none;
      text-align: center;
      cursor: pointer;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
      transition: all 0.2s ease-in-out;
    }

    .flatpickr-input-custom:hover {
      border-color: #cbd5e1;
    }

    .flatpickr-input-custom:focus {
      border-color: var(--primary-color, #22c55e);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12), inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .divider-dot {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .tuning-report-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .detail-report-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 1.5rem;
    }

    .detail-report-box h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0.75rem;
    }

    .report-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .report-list li {
      position: relative;
      padding-left: 1.25rem;
    }

    .report-list li::before {
      content: "•";
      position: absolute;
      left: 0.25rem;
      color: var(--accent-color);
      font-weight: bold;
    }

    /* Back Button */
    .back-btn-container {
      margin-bottom: 1.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary, #64748b);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      background: #ffffff;
      border: 1px solid var(--border-color, #e2e8f0);
      border-radius: 30px; /* 둥근 칩 디자인 */
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .back-link svg {
      transition: transform 0.25s ease;
    }

    .back-link:hover {
      color: var(--primary-color, #22c55e);
      border-color: var(--primary-color, #22c55e);
      background: rgba(34, 197, 94, 0.04);
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.08);
      transform: translateY(-1px);
    }

    .back-link:hover svg {
      transform: translateX(-3px); /* 호버 시 화살표가 왼쪽으로 슥 이동 */
    }

    .lang-switcher {
      min-width: 100px;
      height: 32px;
      padding: 0 8px;
      cursor: pointer;
    }

    @media (max-width: 1024px) {
      .tuning-grid {
        grid-template-columns: 1fr 1fr;
      }

      .tuning-report-section {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      /* 백 링크 & 언어 선택기 모바일 대응 */
      .back-btn-container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
        gap: 0.5rem;
      }
      
      .back-link {
        font-size: 0.8rem;
        padding: 0.35rem 0.75rem;
      }
      
      .lang-switcher {
        width: auto !important;
        min-width: 90px;
        font-size: 0.8rem;
        height: 30px;
      }

      /* 날짜 선택기 모바일 레이아웃 최적화 */
      .period-selectors {
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
        padding: 1.25rem 1rem;
      }

      .period-selectors > .divider-dot {
        display: none; /* 세로 구분 바 '|' 숨김 */
      }

      .datepicker-wrapper {
        display: flex;
        flex-direction: row;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
        width: 100%;
      }

      .datepicker-wrapper label {
        min-width: 0;
        width: 100%;
        margin-bottom: 0.25rem;
      }

      .flatpickr-input-custom {
        flex: 1;
        min-width: 100px;
      }
    }

    @media (max-width: 480px) {
      .tuning-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <!-- Loading Overlay -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-content">
          <div class="premium-spinner"></div>
          <p class="loading-text" data-i18n="loading">データロード中...</p>
        </div>
      </div>

      <div class="back-btn-container" style="display: flex; justify-content: space-between; align-items: center;">
        <a href="../" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span data-i18n="backToLab">実験スペースに戻る</span>
        </a>
        <select id="langSelect" class="form-select lang-switcher" aria-label="Language">
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
        </select>
      </div>

      <!-- Filters Section -->
      <section class="filters-card">
        <div class="filter-group domain-filter-group">
          <label data-i18n="filter.domain">ドメイン</label>
          <div id="hierarchicalDomainSelector" class="hierarchical-selector">
            <div class="breadcrumb-container" id="breadcrumbContainer">
              <div class="breadcrumb-item loading" data-i18n="loading">データロード中...</div>
            </div>
          </div>
        </div>

        <div class="filter-group target-type-group">
          <label data-i18n="filter.target">対象</label>
          <div class="toggle-group">
            <input type="radio" id="typeInstance" name="targetType" value="instance" checked>
            <label for="typeInstance" data-i18n="target.instance">インスタンス</label>
            <input type="radio" id="typeBusiness" name="targetType" value="business">
            <label for="typeBusiness" data-i18n="target.business">ビジネス</label>
          </div>
        </div>

        <div class="filter-group instance-filter-group" id="instanceFilterArea">
          <select id="instanceSelect" class="form-select">
            <option value="" data-i18n="select.allInstances">全体インスタンス</option>
          </select>
        </div>

        <div class="filter-group business-filter-group hidden" id="businessFilterArea">
          <select id="businessSelect" class="form-select">
            <option value="" data-i18n="select.allBusinesses">全体ビジネス</option>
          </select>
        </div>

        <div class="filter-actions">
          <button id="tuningHelpBtn" class="help-btn-circle" data-i18n-title="help" title="分析ヘルプ">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </button>
        </div>
      </section>

      <!-- Before / After Period Selection -->
      <section class="period-selectors">
        <div class="datepicker-wrapper">
          <label data-i18n="tuning.beforePeriod">改善前 (Before) 期間:</label>
          <input type="text" id="beforeStart" class="flatpickr-input-custom">
          <span class="divider-dot">~</span>
          <input type="text" id="beforeEnd" class="flatpickr-input-custom">
        </div>
        <span class="divider-dot">|</span>
        <div class="datepicker-wrapper">
          <label data-i18n="tuning.afterPeriod">改善後 (After) 期間:</label>
          <input type="text" id="afterStart" class="flatpickr-input-custom">
          <span class="divider-dot">~</span>
          <input type="text" id="afterEnd" class="flatpickr-input-custom">
        </div>
      </section>

      <!-- Tuning Comparison Dashboard Cards -->
      <section class="tuning-grid">
        <div class="tuning-card">
          <h4 data-i18n="tuning.avgResponseTimeCard">平均応答時間 (Response Time)</h4>
          <div class="value" id="rtVal">- ms</div>
          <div class="change-rate" id="rtDiff">-</div>
        </div>
        <div class="tuning-card">
          <h4 data-i18n="tuning.avgTpsCard">平均 TPS</h4>
          <div class="value" id="tpsVal">-</div>
          <div class="change-rate" id="tpsDiff">-</div>
        </div>
        <div class="tuning-card">
          <h4 data-i18n="tuning.errRateCard">エラー率 (Error Rate)</h4>
          <div class="value" id="errVal">-%</div>
          <div class="change-rate" id="errDiff">-</div>
        </div>
        <div class="tuning-card">
          <h4 data-i18n="tuning.resourceEfficiencyCard">リソース効率性 (CPU/TPS)</h4>
          <div class="value" id="effVal">- %</div>
          <div class="change-rate" id="effDiff">-</div>
        </div>
      </section>

      <!-- Overlay Performance Chart -->
      <section class="chart-card single-chart-card">
        <div class="chart-header">
          <div class="metrics-toggle" id="metricsToggle">
            <button class="metric-btn active" data-metric="service_time" data-i18n="metric.service_time">応答時間</button>
            <button class="metric-btn" data-metric="service_rate" data-i18n="metric.service_rate">TPS</button>
            <button class="metric-btn" data-metric="err_rate" data-i18n="metric.err_rate">エラー率</button>
            <button class="metric-btn hidden" data-metric="sys_cpu" id="btnSysCpu" data-i18n="metric.sys_cpu">CPU使用率</button>
          </div>
          <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 1rem;">
            <span><span style="color: #f87171; font-weight: bold;">■</span> Before</span>
            <span><span style="color: #4ade80; font-weight: bold;">■</span> After</span>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="tuningChart"></canvas>
        </div>
      </section>

      <!-- Diagnostic & Improvement Reports -->
      <section class="tuning-report-section">
        <div class="detail-report-box">
          <h3 data-i18n="tuning.beforeBottleneckHeader">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            改善前のボトルネック診断 (Before Analysis)
          </h3>
          <ul class="report-list" id="beforeDiagnosisReport">
            <li data-i18n="tuning.defaultDiagnosisText">データ読み込み後に診断が実行されます。</li>
          </ul>
        </div>

        <div class="detail-report-box">
          <h3 data-i18n="tuning.verdictHeader">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            改善効果検証リポート (Tuning Verdict)
          </h3>
          <ul class="report-list" id="tuningEffectVerdict">
            <li data-i18n="tuning.defaultVerdictText">改善前と改善後のデータを比較して、パフォーマンスの検証結果を表示します。</li>
          </ul>
        </div>
      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script type="module" src="../src/i18n.js"></script>
  <script type="module" src="../src/tuning.js"></script>
</body>
</html>
