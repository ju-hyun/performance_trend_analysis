<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../pta/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../pta/config.js"></script>
  <title>性能改善の根拠 & 効果分析</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <!-- D3.js & Flatpickr CSS -->
  <script src="https://d3js.org/d3.v7.min.js" crossorigin></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="../src/style.css">
  <style>
    /* 신규 기능 전용 프리미엄 스타일 */
    .tuning-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .tuning-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 1.25rem;
      backdrop-filter: blur(12px);
      text-align: center;
      transition: all 0.3s;
    }

    .tuning-card:hover {
      transform: translateY(-4px);
      border-color: rgba(34, 197, 94, 0.2);
    }

    .tuning-card h4 {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .tuning-card .value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .tuning-card .change-rate {
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 0.25rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .rate-up {
      color: #f87171;
    }

    .rate-down {
      color: #4ade80;
    }

    .period-selectors {
      display: flex;
      gap: 1rem;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0.75rem 1.25rem;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .datepicker-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .datepicker-wrapper label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .flatpickr-input-custom {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      width: 130px;
      outline: none;
      text-align: center;
      cursor: pointer;
    }

    .flatpickr-input-custom:focus {
      border-color: var(--accent-color);
    }

    .divider-dot {
      color: rgba(255, 255, 255, 0.2);
    }

    .tuning-report-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .detail-report-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 1.5rem;
    }

    .detail-report-box h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0.75rem;
    }

    .report-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .report-list li {
      position: relative;
      padding-left: 1.25rem;
    }

    .report-list li::before {
      content: "•";
      position: absolute;
      left: 0.25rem;
      color: var(--accent-color);
      font-weight: bold;
    }

    /* Back Button */
    .back-btn-container {
      margin-bottom: 1.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--accent-color);
    }

    @media (max-width: 1024px) {
      .tuning-grid {
        grid-template-columns: 1fr 1fr;
      }

      .tuning-report-section {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <main class="main-content">
      <!-- Loading Overlay -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-content">
          <div class="premium-spinner"></div>
          <p class="loading-text">データロード中...</p>
        </div>
      </div>

      <div class="back-btn-container">
        <a href="../" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          実験スペースに戻る
        </a>
      </div>

      <!-- Filters Section -->
      <section class="filters-card">
        <div class="filter-group domain-filter-group">
          <label>ドメイン</label>
          <div id="hierarchicalDomainSelector" class="hierarchical-selector">
            <div class="breadcrumb-container" id="breadcrumbContainer">
              <div class="breadcrumb-item loading">データロード中...</div>
            </div>
          </div>
        </div>

        <div class="filter-group target-type-group">
          <label>対象</label>
          <div class="toggle-group">
            <input type="radio" id="typeInstance" name="targetType" value="instance" checked>
            <label for="typeInstance">インスタンス</label>
            <input type="radio" id="typeBusiness" name="targetType" value="business">
            <label for="typeBusiness">ビジネス</label>
          </div>
        </div>

        <div class="filter-group instance-filter-group" id="instanceFilterArea">
          <select id="instanceSelect" class="form-select">
            <option value="">全体インスタンス</option>
          </select>
        </div>

        <div class="filter-group business-filter-group hidden" id="businessFilterArea">
          <select id="businessSelect" class="form-select">
            <option value="">全体ビジネス</option>
          </select>
        </div>

        <div class="filter-actions">
          <button id="tuningHelpBtn" class="help-btn-circle" title="分析ヘルプ">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </button>
        </div>
      </section>

      <!-- Before / After Period Selection -->
      <section class="period-selectors">
        <div class="datepicker-wrapper">
          <label>改善前 (Before) 期間:</label>
          <input type="text" id="beforeStart" class="flatpickr-input-custom">
          <span class="divider-dot">~</span>
          <input type="text" id="beforeEnd" class="flatpickr-input-custom">
        </div>
        <span class="divider-dot">|</span>
        <div class="datepicker-wrapper">
          <label>改善後 (After) 期間:</label>
          <input type="text" id="afterStart" class="flatpickr-input-custom">
          <span class="divider-dot">~</span>
          <input type="text" id="afterEnd" class="flatpickr-input-custom">
        </div>
      </section>

      <!-- Tuning Comparison Dashboard Cards -->
      <section class="tuning-grid">
        <div class="tuning-card">
          <h4>平均応答時間 (Response Time)</h4>
          <div class="value" id="rtVal">- ms</div>
          <div class="change-rate" id="rtDiff">-</div>
        </div>
        <div class="tuning-card">
          <h4>平均 TPS</h4>
          <div class="value" id="tpsVal">-</div>
          <div class="change-rate" id="tpsDiff">-</div>
        </div>
        <div class="tuning-card">
          <h4>エラー率 (Error Rate)</h4>
          <div class="value" id="errVal">-%</div>
          <div class="change-rate" id="errDiff">-</div>
        </div>
        <div class="tuning-card">
          <h4>リソース効率性 (CPU/TPS)</h4>
          <div class="value" id="effVal">- %</div>
          <div class="change-rate" id="effDiff">-</div>
        </div>
      </section>

      <!-- Overlay Performance Chart -->
      <section class="chart-card single-chart-card">
        <div class="chart-header">
          <div class="metrics-toggle" id="metricsToggle">
            <button class="metric-btn active" data-metric="service_time">応答時間</button>
            <button class="metric-btn" data-metric="service_rate">TPS</button>
            <button class="metric-btn" data-metric="err_rate">エラー率</button>
            <button class="metric-btn hidden" data-metric="sys_cpu" id="btnSysCpu">CPU使用率</button>
          </div>
          <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 1rem;">
            <span><span style="color: #f87171; font-weight: bold;">■</span> Before</span>
            <span><span style="color: #4ade80; font-weight: bold;">■</span> After</span>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="tuningChart"></canvas>
        </div>
      </section>

      <!-- Diagnostic & Improvement Reports -->
      <section class="tuning-report-section">
        <div class="detail-report-box">
          <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            改善前のボトルネック診断 (Before Analysis)
          </h3>
          <ul class="report-list" id="beforeDiagnosisReport">
            <li>データ読み込み後に診断が実行されます。</li>
          </ul>
        </div>

        <div class="detail-report-box">
          <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            改善効果検証リポート (Tuning Verdict)
          </h3>
          <ul class="report-list" id="tuningEffectVerdict">
            <li>改善前と改善後のデータを比較して、パフォーマンスの検証結果を表示します。</li>
          </ul>
        </div>
      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <script type="module" src="../src/tuning.js"></script>
</body>

</html>
