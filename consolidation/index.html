<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../pta/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../pta/config.js"></script>
  <title data-i18n="consolidation.pageTitle">서버 통폐합 & 밀도 최적화</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" crossorigin></script>

  <link rel="stylesheet" href="../src/style.css">
  <style>
    /* Custom styling for Server Consolidation page */
    .checkbox-grid-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    .server-list-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .server-checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background-color: var(--gray-50);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s ease;
    }

    .server-checkbox-label:hover {
      border-color: var(--primary-color);
      background-color: var(--gray-100);
    }

    .server-checkbox-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .server-checkbox-label.selected {
      border-color: var(--primary-color);
      background-color: var(--accent-light);
      color: var(--primary-color);
      font-weight: 600;
    }

    .contention-low {
      color: #16a34a;
      font-weight: 700;
    }

    .contention-medium {
      color: #ca8a04;
      font-weight: 700;
    }

    .contention-high {
      color: #dc2626;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <main class="main-content">
      <!-- Loading Overlay -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-content">
          <div class="premium-spinner"></div>
          <p class="loading-text" data-i18n="loading">데이터 로딩 중...</p>
        </div>
      </div>

      <!-- Navigation & Header -->
      <div class="back-btn-container" style="display: flex; justify-content: space-between; align-items: center;">
        <a href="../" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span data-i18n="backToLab">실험 공간으로 돌아가기</span>
        </a>
        <select id="langSelect" class="form-select lang-switcher" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>

      <header class="dashboard-header" style="margin-bottom: 1.5rem;">
        <h1 data-i18n="consolidation.pageTitle" style="font-size: 1.6rem; font-weight: 800; color: var(--text-primary);">서버 통폐합 & 밀도 최적화</h1>
      </header>

      <!-- Simulated Data Warning Banner -->
      <div id="simulatedWarningBanner" class="premium-alert-banner hidden" style="margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; padding: 12px 16px; background-color: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 6px; color: #d97706; font-size: 0.85rem; font-weight: 600;">
        <span class="warning-icon" style="font-size: 1.1rem; line-height: 1;">⚠️</span>
        <span data-i18n="data.simulatedWarning">API로부터 충분한 이력 데이터를 조회할 수 없어 통계 시뮬레이션 데이터를 표시하고 있습니다.</span>
      </div>

      <!-- Filters Section -->
      <section class="filters-card">
        <div class="filter-group domain-filter-group" style="margin-bottom: 0;">
          <label data-i18n="filter.domain">도메인</label>
          <div id="hierarchicalDomainSelector" class="hierarchical-selector">
            <div class="breadcrumb-container" id="breadcrumbContainer">
              <div class="breadcrumb-item loading" data-i18n="loading">데이터 로딩 중...</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Server Multi-Select Panel -->
      <section class="checkbox-grid-card">
        <div class="checkbox-title" data-i18n="consolidation.selectServers">통합 대상 인스턴스 선택</div>
        <div class="server-list-container" id="serverListContainer">
          <!-- Populated dynamically -->
        </div>
      </section>

      <!-- Simulation Summary Cards -->
      <section class="summary-cards" style="margin-top: 1rem; margin-bottom: 1.5rem;">
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #10b981;">💵</span>
            <h3 data-i18n="consolidation.savings">연간 인프라 비용 절감액</h3>
          </div>
          <div class="summary-value" id="savingsValue">$0 / Year</div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #ef4444;">⚠️</span>
            <h3 data-i18n="consolidation.contentionRisk">통합 후 리소스 경합 확률</h3>
          </div>
          <div class="summary-value" id="contentionValue">0%</div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #3b82f6;">📊</span>
            <h3 data-i18n="consolidation.peakCpu">통합 후 예측 CPU 피크값</h3>
          </div>
          <div class="summary-value" id="peakCpuValue">0%</div>
        </div>
      </section>

      <!-- Charts Layout -->
      <section class="charts-grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <div class="chart-card">
          <div class="chart-header">
            <h3 data-i18n="consolidation.chartBefore" style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary);">통합 전 개별 인프라 부하 (24시간)</h3>
          </div>
          <div class="chart-container" style="height: 320px;">
            <canvas id="chartBeforeConsolidation"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-header">
            <h3 data-i18n="consolidation.chartAfter" style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary);">통합 시 가상 인프라 부하</h3>
          </div>
          <div class="chart-container" style="height: 320px;">
            <canvas id="chartAfterConsolidation"></canvas>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../src/consolidation.js"></script>
</body>

</html>
