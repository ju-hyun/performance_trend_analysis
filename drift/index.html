<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../pta/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../pta/config.js"></script>
  <title data-i18n="drift.pageTitle">응답시간 분포 드리프트 분석</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <!-- Flatpickr (Date Picker) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" crossorigin></script>

  <link rel="stylesheet" href="../src/style.css">
  <style>
    /* Custom CSS for Response Time Drift page */
    .datepicker-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drift-cause-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }

    .drift-cause-header {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drift-cause-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .drift-cause-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 1rem;
      background-color: var(--gray-50);
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    .cause-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .cause-details h4 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .cause-details p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .drift-status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
    }

    .drift-status-badge.stable {
      background-color: rgba(34, 197, 94, 0.15);
      color: #16a34a;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .drift-status-badge.warning {
      background-color: rgba(234, 179, 8, 0.15);
      color: #ca8a04;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .drift-status-badge.danger {
      background-color: rgba(239, 68, 68, 0.15);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
  </style>
</head>

<body>
  <div class="app-container">
    <main class="main-content">
      <!-- Loading Overlay -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-content">
          <div class="premium-spinner"></div>
          <p class="loading-text" data-i18n="loading">데이터 로딩 중...</p>
        </div>
      </div>

      <!-- Navigation & Header -->
      <div class="back-btn-container" style="display: flex; justify-content: space-between; align-items: center;">
        <a href="../" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span data-i18n="backToLab">실험 공간으로 돌아가기</span>
        </a>
        <select id="langSelect" class="form-select lang-switcher" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>

      <header class="dashboard-header" style="margin-bottom: 1.5rem;">
        <h1 data-i18n="drift.pageTitle" style="font-size: 1.6rem; font-weight: 800; color: var(--text-primary);">응답시간 분포 드리프트 분석</h1>
      </header>

      <!-- Simulated Data Warning Banner -->
      <div id="simulatedWarningBanner" class="premium-alert-banner hidden" style="margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; padding: 12px 16px; background-color: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 6px; color: #d97706; font-size: 0.85rem; font-weight: 600;">
        <span class="warning-icon" style="font-size: 1.1rem; line-height: 1;">⚠️</span>
        <span data-i18n="data.simulatedWarning">API로부터 충분한 이력 데이터를 조회할 수 없어 통계 시뮬레이션 데이터를 표시하고 있습니다.</span>
      </div>

      <!-- Filters Section -->
      <section class="filters-card">
        <div class="filter-group domain-filter-group" style="margin-bottom: 0;">
          <label data-i18n="filter.domain">도메인</label>
          <div id="hierarchicalDomainSelector" class="hierarchical-selector">
            <div class="breadcrumb-container" id="breadcrumbContainer">
              <div class="breadcrumb-item loading" data-i18n="loading">데이터 로딩 중...</div>
            </div>
          </div>
        </div>

        <div class="filter-group datepicker-container">
          <div>
            <label data-i18n="drift.baselinePeriod" style="display: block; font-size: 0.8rem; margin-bottom: 4px;">기준 기간 (Period A)</label>
            <input type="text" id="baselinePicker" class="form-select" style="width: 130px;" placeholder="Select Period A">
          </div>
          <span style="align-self: flex-end; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">VS</span>
          <div>
            <label data-i18n="drift.comparePeriod" style="display: block; font-size: 0.8rem; margin-bottom: 4px;">비교 기간 (Period B)</label>
            <input type="text" id="comparePicker" class="form-select" style="width: 130px;" placeholder="Select Period B">
          </div>
        </div>
      </section>

      <!-- Summary Cards -->
      <section class="summary-cards" style="margin-top: 1rem; margin-bottom: 1.5rem;">
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #3b82f6;">⏱️</span>
            <h3 data-i18n="drift.avgDrift">응답시간 평균 드리프트</h3>
          </div>
          <div class="summary-value" id="avgDriftValue">+0.0 ms (+0.0%)</div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #ca8a04;">📈</span>
            <h3 data-i18n="drift.p95Drift">P95 응답시간 드리프트</h3>
          </div>
          <div class="summary-value" id="p95DriftValue">+0.0 ms (+0.0%)</div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #ef4444;">↔️</span>
            <h3 data-i18n="drift.shiftAmount">분포 곡선 이동량 (Shift)</h3>
          </div>
          <div class="summary-value" id="shiftAmountValue">No Shift</div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon" style="color: #10b981;">🛡️</span>
            <h3 data-i18n="drift.status">드리프트 진단 상태</h3>
          </div>
          <div class="summary-value" id="driftStatusValue">
            <span class="drift-status-badge stable">안정 (Stable)</span>
          </div>
        </div>
      </section>

      <!-- Main Chart Card -->
      <section class="charts-grid">
        <div class="chart-card single-chart-card">
          <div class="chart-header">
            <h3 data-i18n="drift.chartTitle" style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary);">응답시간 확률밀도(Log-Normal) 분포 비교</h3>
          </div>
          <div class="chart-container" style="height: 380px;">
            <canvas id="driftChart"></canvas>
          </div>
        </div>
      </section>

      <!-- Cause Analysis Panel -->
      <section class="drift-cause-card">
        <div class="drift-cause-header">
          <span>🧠</span>
          <span data-i18n="drift.causeTitle">성능 드리프트 근본 원인 분석</span>
        </div>
        <div class="drift-cause-list" id="driftCauseList">
          <!-- Dynamically populated -->
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../src/drift.js"></script>
</body>

</html>
