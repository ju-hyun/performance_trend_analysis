<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성능 트렌드 분석</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <!-- D3.js & d3-hexbin -->
  <script src="https://d3js.org/d3.v7.min.js" crossorigin></script>
  <script src="https://d3js.org/d3-hexbin.v0.2.min.js" crossorigin></script>

  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <div class="app-container">
    <main class="main-content">
      <!-- Filters Section -->
      <section class="filters-card">
        <div class="filter-group">
          <label>도메인</label>
          <select id="domainSelect" class="form-select"></select>
          <input type="hidden" id="token" value="d5HJuONXNZf">
        </div>
        <div class="filter-group">
          <label>인스턴스 (선택)</label>
          <select id="instanceSelect" class="form-select">
            <option value="">전체 (도메인 단위조회)</option>
          </select>
        </div>
      </section>


      <!-- Charts Grid -->
      <section class="charts-grid">
        <div class="chart-card single-chart-card">
          <div class="chart-header">
            <div class="metrics-toggle" id="metricsToggle">
              <button class="metric-btn active" data-metric="service_time">응답시간</button>
              <button class="metric-btn" data-metric="service_rate">TPS</button>
              <button class="metric-btn" data-metric="service_count">Hit수</button>
              <button class="metric-btn" data-metric="concurrent_user">동시사용자</button>
              <button class="metric-btn hidden" data-metric="sys_cpu" id="btnSysCpu">시스템CPU</button>
              <button class="metric-btn hidden" data-metric="heap_usage" id="btnHeapUsage">메모리사용률</button>
            </div>
            <div class="chart-type-toggle">
              <button class="type-btn active" data-type="line">라인</button>
              <button class="type-btn" data-type="bar">바</button>
            </div>
          </div>
          <div class="chart-container">
            <canvas id="mainChart"></canvas>
          </div>
          <div class="chart-stats-container" id="chartStats">
            <div class="stats-row stats-avg-row">
              <div class="stats-label">평균</div>
              <div class="stats-values-wrapper" id="statsAvgValues"></div>
            </div>
            <div class="stats-row stats-rate-row">
              <div class="stats-label">전월비</div>
              <div class="stats-values-wrapper" id="statsRateValues"></div>
            </div>
          </div>
        </div>
      </section>


      <!-- Summary Cards & Selection Info -->
      <section class="summary-cards">
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <circle cx="8" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
                <circle cx="12" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
                <circle cx="16" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
              </svg>
            </span>
            <h3>기간</h3>
          </div>
          <div class="summary-value selection-value" id="selectedRangeDisplay">로딩 중...</div>
        </div>
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>
            </span>
            <h3>피크일</h3>
          </div>
          <div class="summary-value" id="peakDate">-</div>
        </div>
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </span>
            <h3>평균 응답시간</h3>
          </div>
          <div class="summary-value" id="avgResponseTime">0 <span class="unit">ms</span></div>
        </div>
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
              </svg>
            </span>
            <h3>평균 TPS</h3>
          </div>
          <div class="summary-value" id="avgTps">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <path d="M12 2v20"></path>
                <path d="m17 17-5 5-5-5"></path>
                <path d="M12 22v-5"></path>
                <circle cx="12" cy="7" r="5"></circle>
              </svg>
            </span>
            <h3>평균 Hit수</h3>
          </div>
          <div class="summary-value" id="avgHits">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </span>
            <h3>평균 동시사용자</h3>
          </div>
          <div class="summary-value" id="avgConcurrentUsers">0</div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="9" y1="1" x2="9" y2="4"></line>
                <line x1="15" y1="1" x2="15" y2="4"></line>
                <line x1="9" y1="20" x2="9" y2="23"></line>
                <line x1="15" y1="20" x2="15" y2="23"></line>
                <line x1="20" y1="9" x2="23" y2="9"></line>
                <line x1="20" y1="15" x2="23" y2="15"></line>
                <line x1="1" y1="9" x2="4" y2="9"></line>
                <line x1="1" y1="15" x2="4" y2="15"></line>
              </svg>
            </span>
            <h3>평균 CPU</h3>
          </div>
          <div class="summary-value" id="avgSysCpu">0%</div>
        </div>
        <div class="summary-card">
          <div class="summary-header">
            <span class="summary-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="summary-icon-svg">
                <path d="M6 19v-3"></path>
                <path d="M10 19V11"></path>
                <path d="M14 19V7"></path>
                <path d="M18 19V3"></path>
                <path d="M22 19V15"></path>
              </svg>
            </span>
            <h3>메모리사용률</h3>
          </div>
          <div class="summary-value" id="avgHeapUsage">0%</div>
        </div>
      </section>

      <!-- Heatmaps Section -->
      <section class="heatmaps-grid">
        <div class="chart-card heatmap-card">
          <div class="chart-header">
            <h3>데이터 분포 (Overall)</h3>
            <div class="heatmap-legend">
              <span class="legend-item"><span class="dot" style="background: rgba(34, 197, 94, 0.1)"></span>낮음</span>
              <span class="legend-item"><span class="dot" style="background: rgba(34, 197, 94, 1)"></span>높음</span>
            </div>
          </div>
          <div class="heatmap-container" id="overallHeatmap">
            <!-- Overall Heatmap Content -->
            <div class="heatmap-placeholder">데이터 조회 후 표시됩니다.</div>
          </div>
          <div class="heatmap-footer">
            <span class="axis-label y-axis-label" id="overallHeatmapLabelY">응답시간 (ms)</span>
            <span class="axis-label x-axis-label">Hit수 (count)</span>
          </div>
        </div>

        <div class="chart-card heatmap-card">
          <div class="chart-header">
            <h3>요일 x 시간대별 응답시간</h3>
            <div class="heatmap-legend">
              <span class="legend-item"><span class="status-box good"></span><span id="legendGoodText">양호</span></span>
              <span class="legend-item"><span class="status-box warning"></span><span
                  id="legendWarningText">주의</span></span>
              <span class="legend-item"><span class="status-box danger"></span><span
                  id="legendDangerText">나쁨</span></span>
            </div>
          </div>
          <div class="heatmap-container" id="dayHourHeatmap">
            <!-- Day x Hour Heatmap Content -->
            <div class="heatmap-placeholder">데이터 조회 후 표시됩니다.</div>
          </div>
          <div class="heatmap-footer">
            <span class="axis-label y-axis-label">요일 (Day)</span>
            <span class="axis-label x-axis-label">시간대 (Hour)</span>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
</body>

</html>
