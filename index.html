<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Trend Analysis</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            color: #0f172a;
        }

        p {
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(34, 197, 94, 0.4);
        }

        .btn:hover {
            background-color: #16a34a;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(34, 197, 94, 0.5);
        }
    </style>
</head>

<body>
    <div class="card">
        <div style="font-size: 3rem; margin-bottom: 1rem;">📊</div>
        <h1>Performance Trend Analysis</h1>
        <p>システムの性能推移を分析し、レポートを確認します。</p>
        <a href="pta/" class="btn">システムスタート</a>
    </div>
</body>

</html>
