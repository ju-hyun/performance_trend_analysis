<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성능 트렌드 분석</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css" />
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <div class="app-container">
    <main class="main-content">
      <!-- Filters Section -->
      <section class="filters-card">
        <div class="filter-group">
          <label>도메인</label>
          <select id="domainSelect" class="form-select">
            <input type="hidden" id="token" value="d5HJuONXNZf">
          </select>
        </div>
        <div class="filter-group">
          <label>인스턴스 (선택)</label>
          <select id="instanceSelect" class="form-select">
            <option value="">전체 (도메인 단위조회)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>메트릭스</label>
          <select id="metricsSelect" class="form-select">
            <option value="service_time">응답시간</option>
            <option value="service_rate">TPS</option>
            <option value="concurrent_user">동시사용자수</option>
          </select>
        </div>
        <div class="filter-group custom-date-group">
          <label>조회 기간</label>
          <div class="date-picker-wrapper">
            <input type="text" id="dateRange" class="form-input" placeholder="날짜 선택">
            <span class="calendar-icon">📅</span>
          </div>
        </div>
        <div class="filter-actions">
          <button id="searchBtn" class="btn btn-primary">조회</button>
        </div>
      </section>

      <!-- Summary Cards -->
      <section class="summary-cards">
        <div class="summary-card">
          <h3>기간 피크일</h3>
          <div class="summary-value" id="peakDate">-</div>
          <div class="summary-label">최대 호출수 기준</div>
        </div>
        <div class="summary-card">
          <h3>평균 응답시간</h3>
          <div class="summary-value" id="avgResponseTime">0 <span class="unit">ms</span></div>
          <div class="summary-label">조회 기간 평균</div>
        </div>
        <div class="summary-card">
          <h3>평균 TPS</h3>
          <div class="summary-value" id="avgTps">0</div>
          <div class="summary-label">조회 기간 평균</div>
        </div>
        <div class="summary-card">
          <h3>평균 동시사용자</h3>
          <div class="summary-value" id="avgConcurrentUsers">0</div>
          <div class="summary-label">조회 기간 평균</div>
        </div>
      </section>

      <!-- Charts Grid -->
      <section class="charts-grid">
        <div class="chart-card single-chart-card">
          <div class="chart-header">
            <h3 id="chartTitle">응답시간</h3>
            <div class="chart-type-toggle">
              <button class="type-btn active" data-type="line">라인</button>
              <button class="type-btn" data-type="bar">바</button>
            </div>
          </div>
          <div class="chart-container">
            <canvas id="mainChart"></canvas>
          </div>
          <div class="chart-stats-container" id="chartStats">
            <div class="stats-row stats-avg-row">
              <div class="stats-label">평균</div>
              <div class="stats-values-wrapper" id="statsAvgValues"></div>
            </div>
            <div class="stats-row stats-rate-row">
              <div class="stats-label">전월비</div>
              <div class="stats-values-wrapper" id="statsRateValues"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Heatmaps Section -->
      <section class="heatmaps-grid">
        <div class="chart-card heatmap-card">
          <div class="chart-header">
            <h3>데이터 분포 (Overall)</h3>
            <div class="heatmap-legend">
              <span class="legend-item"><span class="dot" style="background: rgba(34, 197, 94, 0.1)"></span>낮음</span>
              <span class="legend-item"><span class="dot" style="background: rgba(34, 197, 94, 1)"></span>높음</span>
            </div>
          </div>
          <div class="heatmap-container" id="overallHeatmap">
            <!-- Overall Heatmap Content -->
            <div class="heatmap-placeholder">데이터 조회 후 표시됩니다.</div>
          </div>
          <div class="heatmap-footer">
            <span class="axis-label x-axis-label">응답시간 (ms)</span>
            <span class="axis-label y-axis-label">호출수 (count)</span>
          </div>
        </div>

        <div class="chart-card heatmap-card">
          <div class="chart-header">
            <h3>요일 x 시간대별 응답시간</h3>
            <div class="heatmap-legend">
              <span class="legend-item"><span class="status-box good"></span>양호</span>
              <span class="legend-item"><span class="status-box warning"></span>주의</span>
              <span class="legend-item"><span class="status-box danger"></span>나쁨</span>
            </div>
          </div>
          <div class="heatmap-container" id="dayHourHeatmap">
            <!-- Day x Hour Heatmap Content -->
            <div class="heatmap-placeholder">데이터 조회 후 표시됩니다.</div>
          </div>
          <div class="heatmap-footer">
            <span class="axis-label x-axis-label">시간대 (Hour)</span>
            <span class="axis-label y-axis-label">요일 (Day)</span>
          </div>
        </div>
      </section>
    </main>

  <script type="module" src="/src/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
</body>

</html>
