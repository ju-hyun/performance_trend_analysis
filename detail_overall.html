<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>詳細データ (Overall)</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <link rel="stylesheet" href="./src/style.css">
  <style>
    /* Specific styles for detail_overall.html layout */
    body {
      overflow: hidden; /* Prevent full body scroll, handle internally */
    }
    .detail-container {
      display: flex;
      height: 100vh;
      width: 100vw;
      background-color: var(--bg-color);
    }
    .charts-panel {
      width: 90%;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
    }
    .stats-panel {
      width: 10%;
      height: 100%;
      background-color: var(--sidebar-active);
      border-left: 1px solid var(--border-color);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
    }
    .chart-row {
      flex: 1;
      min-height: 120px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      position: relative;
      padding: 5px 10px;
    }
    .chart-row.highlighted {
      border: 2px solid var(--primary-color);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
    }
    .chart-title {
      position: absolute;
      top: 5px;
      left: 10px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      z-index: 10;
    }
    .canvas-container {
      width: 100%;
      height: 100%;
      padding-top: 15px; /* space for title */
    }
    .stat-box {
      flex: 1;
      min-height: 120px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 5px;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 5px;
    }
    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      word-break: break-all;
    }
    .stat-value.highlighted {
      color: var(--primary-color);
    }
    .selected-time-header {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      color: var(--text-primary);
      background: white;
      padding: 5px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }
    
    /* Crosshair line */
    #crosshair-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background-color: rgba(239, 68, 68, 0.6);
      pointer-events: none;
      z-index: 50;
      display: none;
    }
  </style>
</head>

<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loader-content">
      <div class="premium-spinner"></div>
      <p class="loading-text">データロード中...</p>
    </div>
  </div>

  <div class="detail-container">
    <div class="charts-panel" id="chartsPanel">
      <div id="crosshair-line"></div>
      <!-- Charts will be generated here -->
    </div>
    <div class="stats-panel" id="statsPanel">
      <div class="selected-time-header" id="selectedTimeHeader">1時間の平均</div>
      <!-- Stats will be generated here -->
    </div>
  </div>

  <script type="module" src="/src/detail_overall.js"></script>
</body>

</html>
