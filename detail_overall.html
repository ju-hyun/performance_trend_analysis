<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>詳細データ (Overall)</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css"
    rel="stylesheet" crossorigin />
  <link rel="stylesheet" href="./src/style.css">
  <style>
    /* Specific styles for detail_overall.html layout */
    body {
      overflow: hidden;
      /* Prevent full body scroll, handle internally */
    }

    .detail-container {
      display: flex;
      height: calc(100vh - 45px);
      width: 100vw;
      background-color: var(--bg-color);
    }

    .charts-panel {
      width: 88%;
      height: 100%;
      padding: 10px 5px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      /* Increased gap to reduce chart heights */
      overflow-y: auto;
      position: relative;
    }

    .stats-panel {
      width: 12%;
      height: 100%;
      background-color: var(--bg-color);
      /* Same as charts panel */
      padding: 10px 10px 10px 5px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      /* Increased gap to match charts */
      overflow-y: auto;
    }

    .chart-row {
      flex: 1;
      min-height: 120px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      position: relative;
      padding: 5px 10px;
    }

    .chart-row.highlighted {
      border: 2px solid var(--primary-color);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
      background-color: rgba(34, 197, 94, 0.05);
      /* Transparent background for visibility */
    }

    .chart-title {
      position: absolute;
      top: 5px;
      left: 10px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      z-index: 10;
    }

    .canvas-container {
      width: 100%;
      height: 100%;
      padding-top: 15px;
      /* space for title */
    }

    .stat-box {
      flex: 1;
      min-height: 120px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 5px;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      word-break: break-all;
    }

    .stat-value.highlighted {
      color: var(--primary-color);
    }

    .title-container {
      width: 88%;
      padding: 15px 5px 5px 10px;
      display: flex;
      align-items: center;
    }

    .title-label {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      padding-left: 8px
    }

    .selected-time-container {
      width: 12%;
      padding: 15px 10px 5px 5px;
    }

    .selected-time-header {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      color: var(--text-primary);
      background: white;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      margin: 0;
      height: 100%;
    }

    .top-header-container {
      width: 100vw;
      display: flex;
      background-color: var(--bg-color);
    }

    /* Crosshair box */
    #crosshair-line {
      position: absolute;
      /* width will be set dynamically */
      background-color: rgba(100, 116, 139, 0.15);
      /* Box shape instead of line */
      pointer-events: none;
      z-index: 50;
      display: none;
      border-radius: 4px;
    }

    /* Clicked box */
    #clicked-line {
      position: absolute;
      background-color: rgba(239, 68, 68, 0.15);
      /* Reddish */
      border: 1px solid rgba(239, 68, 68, 0.5);
      pointer-events: none;
      z-index: 49;
      display: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loader-content">
      <div class="premium-spinner"></div>
      <p class="loading-text">データロード中...</p>
    </div>
  </div>

  <div class="top-header-container">
    <div class="title-container">
      <h2 class="title-label">詳細データ</h2>
    </div>
    <div class="selected-time-container">
      <div class="selected-time-header" id="selectedTimeHeader">1時間の平均</div>
    </div>
  </div>

  <div class="detail-container">
    <div class="charts-panel" id="chartsPanel">
      <div id="crosshair-line"></div>
      <div id="clicked-line"></div>
      <!-- Charts will be generated here -->
    </div>
    <div class="stats-panel" id="statsPanel">
      <!-- Stats will be generated here -->
    </div>
  </div>

  <script type="module" src="/src/detail_overall.js"></script>
</body>

</html>
